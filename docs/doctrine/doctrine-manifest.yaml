# Doctrine manifest — the single source of truth for this repo's doctrines and their
# required cross-links. Validated by docs/scripts/doctrine-lint.sh (coverage · path ·
# pointer), enforced by .hooks/pre-commit and CI.
#
# Add a new doctrine HERE (and create the file + at least one pointer to it).
#
# Each entry:
#   id:         slug — the file MUST be docs/doctrine/<id>-doctrine.md
#   path:       the doctrine file (must exist)
#   pointers:   docs that MUST link to this doctrine (each must exist + contain the basename)
#   summary:    one-line "why read this" (also read by substrate skills for dispatch)
#   triggers:   brief-content keywords that activate this doctrine (dispatch hint; optional)
#   layer-hint: domain | backend | frontend | infra | cross-cutting (optional)
#
# Formatting is strict (a tiny zero-dep parser reads it): 2-space indent, one "- id:"
# per entry, `pointers` as an inline [a, b] list.

doctrines:
  - id: agents
    path: docs/doctrine/agents-doctrine.md
    pointers: [AGENTS.md]
    summary: The doctrine on doctrines — authoring rules, the manifest as single source of truth, the two enforcement gates, and the drift-evaluation protocol.
    triggers: [doctrine, manifest, drift, lint, gate]
    layer-hint: cross-cutting

  - id: agents-parallel-execution
    path: docs/doctrine/agents-parallel-execution-doctrine.md
    pointers: [AGENTS.md]
    summary: Parallel-bead orchestration — single-writer tracker, integration branch + merge-on-green, file-disjoint waves, gate-before-close, two-stage gate, worktree hygiene.
    triggers: [parallel, worktree, wave, epic, integration branch, merge-on-green]
    layer-hint: cross-cutting

  - id: tooling
    path: docs/doctrine/tooling-doctrine.md
    pointers: [AGENTS.md]
    summary: The no-JS toolchain — TypeScript everywhere, scripts run via tsx (never node), TS build/eslint config (jiti), bash reserved for the zero-dep kernel, gate declared in substrate.yaml.
    triggers: [script, tsx, build, config, eslint, tsconfig, dependency, no-js, tooling]
    layer-hint: infra

  - id: coordinate
    path: docs/doctrine/coordinate-doctrine.md
    pointers: [AGENTS.md]
    summary: The ℤ² lattice — bigint coordinates, the 4-move algebra (path-independent reduce), coordinate hash identity, and the frozen origin-centred Ulam-shell pairing ℤ²↔ℕ with exact bigint isqrt.
    triggers:
      [
        coordinate,
        lattice,
        move,
        reduce,
        hash,
        pairing,
        unpair,
        ulam,
        isqrt,
        floor,
        origin,
        floating origin,
      ]
    layer-hint: domain

  - id: content
    path: docs/doctrine/content-doctrine.md
    pointers: [AGENTS.md]
    summary: The deterministic library cipher — the LineAddress→Glyph[80] bijection over 29⁸⁰, the balanced Feistel (M=H²), the @noble/hashes boundary carve-out, the impossible depth-entropy seam, and the frozen golden vector.
    triggers:
      [
        content,
        cipher,
        feistel,
        permutation,
        alphabet,
        base29,
        glyph,
        line,
        inverse,
        golden vector,
        babel key,
        library drift,
        codec,
      ]
    layer-hint: domain

  - id: render
    path: docs/doctrine/render-doctrine.md
    pointers: [AGENTS.md]
    summary: The presentation/render layer — R3F+three Lane A, the frozen seams (dimensions, book-slot mapping, camera suspend/resume, atmosphere/mirror hooks), deterministic presentation, the draw-call/DPR perf budget, and analytic collision.
    triggers:
      [
        render,
        scene,
        three,
        r3f,
        fiber,
        mesh,
        instancing,
        geometry,
        camera,
        locomotion,
        collision,
        fog,
        lighting,
        material,
        draw call,
      ]
    layer-hint: frontend

  - id: traversal
    path: docs/doctrine/traversal-doctrine.md
    pointers: [AGENTS.md]
    summary: The coordinate-driven world — the constant 11-room working set, the traversal machine (the move log IS the coordinate), synchronous same-frame floating-origin re-base, streaming + shaft phase-lock, and the ±64 soft-stop edge.
    triggers:
      [
        traversal,
        streaming,
        working set,
        working-set,
        floating origin,
        re-base,
        rebase,
        commit plane,
        walkable bound,
        shaft impostor,
        edge,
      ]
    layer-hint: frontend

  - id: audio
    path: docs/doctrine/audio-doctrine.md
    pointers: [AGENTS.md]
    summary: The N-emitter AudioBus — frozen handle-based API, narrow BusContext test seam, procedural ambient (hush + bulb hums), entry-gesture resume, and the Web Audio lifecycle gotchas (StrictMode double-mount silence).
    triggers: [audio, sound, emitter, ambient, hum, listener, web audio, positional, gain]
    layer-hint: frontend

  - id: mood-gate
    path: docs/doctrine/mood-gate-doctrine.md
    pointers: [AGENTS.md]
    summary: Pinning subjective quality — deterministic poses + committed reference captures + objective checklist floor, the human as instrument, and the re-render-and-compare regression protocol for anything touching light/fog/materials.
    triggers: [mood, chills, atmosphere, capture, checklist, pose, acceptance, gate, tuning]
    layer-hint: cross-cutting
